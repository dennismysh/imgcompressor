name: sigil-hs
version: 0.2.0.0
synopsis: Sigil image codec — Haskell reference implementation
license: MIT

default-extensions:
  - StrictData
  - OverloadedStrings

ghc-options:
  - -Wall
  - -O2

dependencies:
  - base >= 4.17 && < 5
  - bytestring >= 0.11
  - deepseq >= 1.4
  - vector >= 0.13
  - binary >= 0.8
  - text >= 2.0
  - containers >= 0.6
  - zlib >= 0.6

library:
  source-dirs: src
  exposed-modules:
    - Sigil
    - Sigil.Core.Types
    - Sigil.Core.Error
    - Sigil.Core.Chunk
    - Sigil.Codec.Predict
    - Sigil.Codec.ZigZag
    - Sigil.Codec.Token
    - Sigil.Codec.Rice
    - Sigil.Codec.Pipeline
    - Sigil.IO.Reader
    - Sigil.IO.Writer
    - Sigil.IO.Convert
    - Sigil.Codec.ANS
    - Sigil.Codec.ColorTransform
    - Sigil.Codec.Wavelet
    - Sigil.Codec.WaveletMut
    - Sigil.Codec.Serialize
    - Sigil.Codec.MagClass
    - Sigil.Codec.SubbandCoder
  dependencies:
    - JuicyPixels >= 3.3
    - time >= 1.12
    - directory >= 1.3
    - filepath >= 1.4
    - process >= 1.6

executables:
  sigil-hs:
    source-dirs: app
    main: Main.hs
    dependencies:
      - sigil-hs
      - optparse-applicative >= 0.18
      - filepath
      - directory
      - time
      - JuicyPixels >= 3.3

  sigil-server:
    source-dirs: server
    main: Main.hs
    dependencies:
      - sigil-hs
      - scotty >= 0.22
      - warp >= 3.3
      - wai-cors
      - wai
      - http-types
      - bytestring
      - JuicyPixels >= 3.3
      - text

tests:
  sigil-hs-test:
    source-dirs: test
    main: Spec.hs
    other-modules:
      - Gen
      - Test.ZigZag
      - Test.Predict
      - Test.Token
      - Test.Rice
      - Test.Pipeline
      - Test.ANS
      - Test.Wavelet
      - Test.WaveletMut
      - Test.ColorTransform
      - Test.Conformance
      - Test.Serialize
      - Test.MagClass
      - Test.SubbandCoder
    dependencies:
      - sigil-hs
      - hspec >= 2.11
      - QuickCheck >= 2.14
      - filepath
      - directory
      - JuicyPixels >= 3.3

benchmarks:
  sigil-hs-bench:
    source-dirs: bench
    main: Main.hs
    dependencies:
      - sigil-hs
      - criterion >= 1.6
      - deepseq
